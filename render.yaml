services:
  - type: web
    name: entropic-writing-lab
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app_v2.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
